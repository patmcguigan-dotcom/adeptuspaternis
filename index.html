<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEC-MAP // OMNISSIAH-G6 // 41M</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        @keyframes globalFlicker { 0% { opacity: 0.99; } 5% { opacity: 0.95; } 10% { opacity: 0.98; } 100% { opacity: 1; } }

        body { margin: 0; background: radial-gradient(circle at center, #010a05 0%, #000000 100%); color: #00ff41; font-family: 'Special Elite', monospace; overflow: hidden; touch-action: none; animation: globalFlicker 0.2s infinite; }
        button { background: rgba(0, 10, 0, 0.6); border: 1px solid #00ff41; color: #00ff41; font-family: inherit; cursor: pointer; text-transform: uppercase; transition: 0.2s; position: relative; z-index: 8000; padding: 8px 15px; box-shadow: 0 0 10px rgba(0,255,65,0.05); }
        button:hover { background: #00ff41; color: #000; box-shadow: 0 0 15px #00ff41; }
        
        #war-log-container { position: absolute; top: 0; left: 0; width: 100%; height: 30px; background: rgba(0, 20, 0, 0.6); border-bottom: 1px solid #00ff41; overflow: hidden; z-index: 7000; display: flex; align-items: center; pointer-events: none; }
        #war-log-text { white-space: nowrap; display: inline-block; padding-left: 100%; animation: ticker 45s linear infinite; font-size: 14px; letter-spacing: 2px; }
        
        #leaderboard { position: absolute; top: 45px; left: 20px; width: 240px; background: rgba(0, 15, 0, 0.85); border: 1px solid #00ff41; padding: 15px; z-index: 7500; font-size: 11px; box-shadow: 0 0 15px rgba(0,255,65,0.1); transition: 0.4s; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; border-bottom: 1px dashed #004411; }
        
        .top-btns { position: absolute; bottom: 25px; right: 20px; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; z-index: 7500; transition: 0.4s; }
        .top-btns button { font-size: 12px; min-width: 140px; padding: 12px; font-weight: bold; }
        .ui-hidden { opacity: 0 !important; pointer-events: none !important; transform: translateY(-10px); }

        #info-box { position: absolute; right: 20px; top: 45px; width: 300px; background: rgba(2, 8, 2, 0.95); border: 1px solid #00ff41; padding: 20px; display: none; z-index: 8500; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        @media (max-width: 600px) { #info-box { width: 90%; left: 5%; right: auto; top: 40px; } }

        .fullscreen-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.98); z-index: 11000; display: none; flex-direction: column; align-items: center; padding-top: 40px; overflow-y: auto; }
        .modal-active { display: flex !important; }
        .slate-box { width: 90%; max-width: 800px; background: #050505; border: 2px solid #00ff41; padding: 30px; color: #00ff41; }
        
        select, input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 8px; font-family: inherit; margin: 5px 0; width: 100%; box-sizing: border-box; }
        
        #instructions { position: absolute; bottom: 0; left: 0; padding: 25px; font-size: 9px; color: #004411; z-index: 10000; cursor: pointer; user-select: none; }
        #reset-view { width: 140px; color: #ff4444; border-color: #ff4444; background: rgba(20,0,0,0.4); display: none; }
    </style>
</head>
<body>

    <div id="war-log-container"><div id="war-log-text">SYSTEM STATUS: NOMINAL // SCANNING SECTOR COGITATOR CHANNELS...</div></div>

    <div id="leaderboard">
        <h3>Campaign Scoreboard</h3>
        <div id="rankings-list"></div>
    </div>
    
    <div class="top-btns">
        <button id="reset-view" onclick="resetSectorView()">[ EXIT SURVEY ]</button>
        <button id="score-toggle" onclick="toggleModal('archive-overlay')">Scoreboard</button>
    </div>

    <!-- SCOREBOARD MODAL -->
    <div id="archive-overlay" class="fullscreen-modal">
        <div class="slate-box">
            <h1 style="text-align: center;">Tactical Battle Records</h1>
            <table style="width:100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em;">
                <thead>
                    <tr style="border-bottom: 1px solid #00ff41;">
                        <th style="text-align:left; padding: 8px;">Combatants</th>
                        <th style="text-align:left; padding: 8px;">Factions</th>
                        <th style="text-align:left; padding: 8px;">Victor</th>
                        <th style="text-align:left; padding: 8px;">Result</th>
                    </tr>
                </thead>
                <tbody id="battle-rows"></tbody>
            </table>
            <button onclick="toggleModal('archive-overlay')" style="width:100%; margin-top:20px; padding: 15px;">Return to Map</button>
        </div>
    </div>

    <!-- STEALTH VAULT INPUT PANEL -->
    <div id="admin-vault" class="fullscreen-modal" style="background: rgba(5,15,5,0.99);">
        <div class="slate-box" style="border-color: #ff0000; color: #ff0000;">
            <h1 style="text-align: center;">LOG CAMPAIGN ENGAGEMENT</h1>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                <div>
                    <label>Attacking Commander</label>
                    <select id="p1-select" onchange="updateFactionDropdown(1)">
                        <option value="Josh">Josh</option>
                        <option value="Kieran">Kieran</option>
                        <option value="Aliks">Aliks</option>
                        <option value="Neil">Neil</option>
                        <option value="Pat">Pat</option>
                    </select>
                    <label>Faction Variant</label>
                    <select id="f1-select"></select>
                    <label style="margin-top:10px; display:block;">Score (VP)</label>
                    <input type="number" id="p1-score" value="0" min="0">
                </div>
                
                <div>
                    <label>Defending Commander</label>
                    <select id="p2-select" onchange="updateFactionDropdown(2)">
                        <option value="Aliks">Aliks</option>
                        <option value="Josh">Josh</option>
                        <option value="Kieran">Kieran</option>
                        <option value="Neil">Neil</option>
                        <option value="Pat">Pat</option>
                    </select>
                    <label>Faction Variant</label>
                    <select id="f2-select"></select>
                    <label style="margin-top:10px; display:block;">Score (VP)</label>
                    <input type="number" id="p2-score" value="0" min="0">
                </div>
            </div>

            <div style="margin-top: 20px;">
                <label>Confirmed Victor</label>
                <select id="victor-select">
                    <option value="1">Attacker Won</option>
                    <option value="2">Defender Won</option>
                </select>
            </div>

            <div style="display:flex; flex-direction:column; gap:10px; margin-top:30px;">
                <button onclick="commitBattleResult()" style="border-color: #00ff41; color: #00ff41; padding: 15px; font-weight: bold;">EXECUTE INVASION PROTOCOLS</button>
                <button onclick="toggleModal('admin-vault')" style="border-color: #555; color: #555; padding: 10px;">Close Vault</button>
            </div>
        </div>
    </div>

    <!-- PLANET HUD -->
    <div id="info-box">
        <div id="faction-label" style="font-size: 0.7em; border: 1px solid #00ff41; padding: 4px; display: inline-block;">STATUS</div>
        <h2 id="planet-name" style="margin: 5px 0;">WORLD</h2>
        <div style="background: rgba(0, 255, 65, 0.1); padding: 10px; border-left: 3px solid #00ff41; margin-top: 10px; font-size: 0.85em;">
            <strong style="color: #00ff41;">TACTICAL DISPATCH DATA:</strong><br>
            <span id="planet-rule">Awaiting cogitator feed...</span>
        </div>
    </div>

    <div id="instructions" onpointerdown="handleAdminTap()">COGITATOR OMNISSIAH-G6 // [ACCESS VAULT]</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>

    <script>
        const VOX_LINK_URL = "https://script.google.com/macros/s/AKfycbSRx6a1NB0zlbl1EAEr9rNsf2V9fhiOnU8CeT93uvaJRmIVQ6Mo6pWWGE51WuGi8oN/exec"; 

        const PLAYER_ARMIES = {
            "Josh": ["Tyranids", "Space Marines (Salamanders)"],
            "Kieran": ["T'au Empire", "Space Marines (Space Wolves)"],
            "Aliks": ["Space Marines"],
            "Neil": ["Aeldari"],
            "Pat": ["Necrons"]
        };

        const FACTION_COLORS = {
            "Necrons": 0x00FF41,
            "T'au Empire": 0xEEEEEE,
            "Space Marines (Space Wolves)": 0xB0C4DE,
            "Tyranids": 0xFF00FF,
            "Space Marines (Salamanders)": 0x228B22,
            "Aeldari": 0x6A0DAD,
            "Space Marines": 0x0000FF,
            "None": 0x8B0000
        };

        let PLANET_DATA = [
            { name: "Solemnace", dist: 35, size: 2.8, player: "Pat", army: "Necrons", color: 0x00FF41, rule: "Established Necron Strategic World Hold.", initialNeutral: false },
            { name: "Damnos", dist: 50, size: 2.5, player: "Pat", army: "Necrons", color: 0x00FF41, rule: "Tomb World Awakening Array.", initialNeutral: false },
            { name: "Gidreem", dist: 65, size: 2.3, player: "Pat", army: "Necrons", color: 0x00FF41, rule: "Dynastic Resource Core.", initialNeutral: false },
            { name: "Mars Prime", size: 3.8, dist: 78, color: 0x8B0000, player: "None", army: "None", rule: "Frontier Sector. Unoccupied.", initialNeutral: true },
            { name: "Quintus", dist: 95, size: 2.4, player: "Pat", army: "Necrons", color: 0x00FF41, rule: "Perimeter Gauss Outpost.", initialNeutral: false },
            { name: "T'au Prime", dist: 110, size: 3.2, player: "Kieran", army: "T'au Empire", color: 0xEEEEEE, rule: "Sept World Center Node.", initialNeutral: false },
            { name: "Vior'la", dist: 125, size: 2.9, player: "Kieran", army: "T'au Empire", color: 0xEEEEEE, rule: "Fire Caste Staging Field.", initialNeutral: false },
            { name: "Armageddon Core", size: 3.2, dist: 142, color: 0x8B0000, player: "None", army: "None", rule: "Industrial Hive Outpost. Unoccupied.", initialNeutral: true },
            { name: "Fenris Core", dist: 160, size: 3.1, player: "Kieran", army: "Space Marines (Space Wolves)", color: 0xB0C4DE, rule: "Space Wolves Sector Hold.", initialNeutral: false },
            { name: "Asaheim", dist: 175, size: 2.6, player: "Kieran", army: "Space Marines (Space Wolves)", color: 0xB0C4DE, rule: "Fortress Anchor Point.", initialNeutral: false },
            { name: "Tyran Primus", dist: 190, size: 2.8, player: "Josh", army: "Tyranids", color: 0xFF00FF, rule: "Bio-Mass Consumption Nest.", initialNeutral: false },
            { name: "Octarius Alpha", dist: 205, size: 3.3, player: "Josh", army: "Tyranids", color: 0xFF00FF, rule: "Hive Fleet Leviathan Spore-Zone.", initialNeutral: false },
            { name: "Necromunda Sector", size: 3.6, dist: 220, color: 0x8B0000, player: "None", army: "None", rule: "Hive World Perimeter. Unoccupied.", initialNeutral: true },
            { name: "Nocturne Prime", size: 3.5, dist: 240, color: 0x228B22, player: "Josh", army: "Space Marines (Salamanders)", rule: "Promethium Reserve: Re-roll one Wound roll of 1 for Melta/Torrent.", initialNeutral: false },
            { name: "Prometheus", size: 3.2, dist: 255, color: 0x228B22, player: "Josh", army: "Space Marines (Salamanders)", rule: "Vulkan's Anvil: +1 to armor save metrics against AP-1 weapons.", initialNeutral: false },
            { name: "Biel-Tan Outpost", size: 4.0, dist: 270, color: 0x6A0DAD, player: "Neil", army: "Aeldari", rule: "Way of the Warrior: +1 to Advance rolls.", initialNeutral: false },
            { name: "Iyanden Anchor", size: 3.3, dist: 285, color: 0x6A0DAD, player: "Neil", army: "Aeldari", rule: "Ghost-Warrior Array: Target ignores Battle-Shock.", initialNeutral: false },
            { name: "Cadia Secundus", size: 3.4, dist: 300, color: 0x8B0000, player: "None", army: "None", rule: "Imperial Bastion Core. Unoccupied.", initialNeutral: true },
            { name: "Alaitoc Rift", size: 2.7, dist: 320, color: 0x6A0DAD, player: "Neil", army: "Aeldari", rule: "Path of the Ranger: Units targeting this world incur -1 to Hit rolls.", initialNeutral: false },
            { name: "Saim-Hann Reach", size: 3.1, dist: 335, color: 0x6A0DAD, player: "Neil", army: "Aeldari", rule: "Wild Rider Charge: Mounted options gain fallback and charge capability.", initialNeutral: false },
            { name: "Macragge", size: 4.2, dist: 355, color: 0x0000FF, player: "Aliks", army: "Space Marines", rule: "Ultramar Discipline: Re-roll failed Leadership tests.", initialNeutral: false },
            { name: "Phall", size: 2.9, dist: 375, color: 0x0000FF, player: "Aliks", army: "Space Marines", rule: "Dorn's Bulwark: Stationary Cover bonus matrix.", initialNeutral: false },
            { name: "Calth", size: 3.4, dist: 315, color: 0x0000FF, player: "Aliks", army: "Space Marines", rule: "Underground Bastions: Detachments receive critical defensive saves.", initialNeutral: false },
            { name: "Rynn's World", size: 3.0, dist: 415, color: 0x0000FF, player: "Aliks", army: "Space Marines", rule: "Crimson Vengeance: Re-roll hit vectors if numerical disadvantage occurs.", initialNeutral: false }
        ];

        let BATTLE_LOGS = [];
        let adminKeySequence = "", tapCount = 0, isZoomed = false, isTransitioning = false;
        let targetPos = new THREE.Vector3(0, 400, 700), targetLookAt = new THREE.Vector3(0, 0, 0);
        let fleetLayer = new THREE.Group(), activeFleets = [];

        function updateFactionDropdown(id) {
            const player = document.getElementById(`p${id}-select`).value;
            const select = document.getElementById(`f${id}-select`);
            select.innerHTML = PLAYER_ARMIES[player].map(a => `<option value="${a}">${a}</option>`).join('');
        }

        async function commitBattleResult() {
            const p1 = document.getElementById('p1-select').value;
            const f1 = document.getElementById('f1-select').value;
            const s1 = parseInt(document.getElementById('p1-score').value) || 0;
            const p2 = document.getElementById('p2-select').value;
            const f2 = document.getElementById('f2-select').value;
            const s2 = parseInt(document.getElementById('p2-score').value) || 0;
            const vicChoice = document.getElementById('victor-select').value;

            const winner = vicChoice === "1" ? p1 : p2;
            const winnerFaction = vicChoice === "1" ? f1 : f2;
            const payload = { p1, f1, s1, p2, f2, s2, winner, winnerFaction };

            BATTLE_LOGS.push(payload);
            processEngagements(BATTLE_LOGS);
            toggleModal('admin-vault');

            try {
                await fetch(VOX_LINK_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            } catch(e) {}
        }

        function processEngagements(logs) {
            PLANET_DATA.forEach(p => {
                if (p.initialNeutral) {
                    p.player = "None"; p.army = "None"; p.color = 0x8B0000; p.rule = "Frontier Sector. Unoccupied.";
                }
            });

            logs.forEach(log => {
                const targetPlanet = PLANET_DATA.find(p => p.player === "None" && p.initialNeutral);
                if (targetPlanet) {
                    targetPlanet.player = log.winner;
                    targetPlanet.army = log.winnerFaction;
                    targetPlanet.color = FACTION_COLORS[log.winnerFaction];
                    targetPlanet.rule = `CRITICAL DEPLOYMENT ARCHIVE DETECTED:\n\n` +
                                         `ENGAGEMENT: ${log.p1} (${log.f1}) VS ${log.p2} (${log.f2})\n` +
                                         `WAR MATRIX RECORD: ${String(log.s1)} VP to ${String(log.s2)} VP.\n\n` +
                                         `The strategic deployments of the ${log.winnerFaction} phalanx forced complete territorial annexation.`;
                }
            });

            PLANET_DATA.forEach((p, idx) => {
                if(planetMeshes[idx]) {
                    planetMeshes[idx].material.color.setHex(p.color);
                    planetMeshes[idx].material.emissive.setHex(p.color);
                    const labelSprite = planetMeshes[idx].getObjectByName("holoLabel");
                    if(labelSprite) {
                        planetMeshes[idx].remove(labelSprite);
                        planetMeshes[idx].add(createLabelSprite(p.player.toUpperCase(), p.color));
                    }
                    const ret = neutralReticles.find(r => r.parent === planetMeshes[idx]);
                    if(ret && p.player !== "None") planetMeshes[idx].remove(ret);
                }
            });

            updateLeaderboard();
            rebuildArchiveTable();
            initFleets(logs);
        }

        function rebuildArchiveTable() {
            document.getElementById('battle-rows').innerHTML = BATTLE_LOGS.map(log => `
                <tr style="border-bottom: 1px dashed #004411;">
                    <td style="padding:8px;">${log.p1} vs ${log.p2}</td>
                    <td style="padding:8px; font-size:0.85em;">${log.f1} vs ${log.f2}</td>
                    <td style="padding:8px; color:#fff;">${log.winner}</td>
                    <td style="padding:8px;">${String(log.s1)} - ${String(log.s2)} VP</td>
                </tr>
            `).join('') || `<tr><td colspan="4" style="text-align:center; padding:20px; opacity:0.5;">[ NO LOGGED CAMPAIGNS ]</td></tr>`;
        }

        // --- SYNTAX CLEANUP: REBUILT FIXED MATH AGGREGATION LOOP ---
        function updateLeaderboard() {
            const plList = ["Aliks", "Kieran", "Josh", "Neil", "Pat"];
            let scores = plList.map(name => {
                let totalVPs = 0;
                BATTLE_LOGS.forEach(log => {
                    if (log.p1 === name) totalVPs += Number(log.s1) || 0;
                    if (log.p2 === name) totalVPs += Number(log.s2) || 0;
                });
                return { name, power: totalVPs };
            }).sort((a,b) => b.power - a.power);
            
            document.getElementById('rankings-list').innerHTML = scores.map(s => `<div class="stat-row"><span>${s.name.toUpperCase()}</span> <span>${s.power} VP</span></div>`).join('');
        }

        async function syncWarLog() {
            try {
                const response = await fetch(VOX_LINK_URL);
                BATTLE_LOGS = await response.json();
                processEngagements(BATTLE_LOGS);
                let reportString = "SYSTEM STATUS: NOMINAL // COGITATOR LINK STABLE // ";
                const news = BATTLE_LOGS.slice(-3).reverse().map(l => `${l.winnerFaction.toUpperCase()} MANIFESTED FRONTIER EXPANSIONS`);
                document.getElementById('war-log-text').innerText = reportString + (news.length ? news.join(" // ") + " // " : "NO RECENT SECTOR CHANGES // ");
            } catch (e) {}
        }

        function handleAdminTap() { tapCount++; if(tapCount >= 5) { toggleModal('admin-vault'); tapCount = 0; if (navigator.vibrate) navigator.vibrate(50); } setTimeout(() => tapCount = 0, 3000); }
        function toggleModal(id) { document.getElementById(id).classList.toggle('modal-active'); }
        function toggleMainUI(show) { 
            const lb = document.getElementById('leaderboard'); const toggleBtn = document.getElementById('score-toggle');
            if (show) { lb.classList.remove('ui-hidden'); toggleBtn.classList.remove('ui-hidden'); } 
            else { lb.classList.add('ui-hidden'); toggleBtn.classList.add('ui-hidden'); } 
        }

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(fleetLayer);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(0, 400, 700); controls.enableDamping = true;
        scene.add(new THREE.AmbientLight(0x335533, 0.8));
        
        const rimScannerLight = new THREE.DirectionalLight(0xffffff, 1.8);
        rimScannerLight.position.set(5, 12, 8); scene.add(rimScannerLight);
        const coreLight = new THREE.PointLight(0x00ff41, 5, 2500); scene.add(coreLight);
        scene.add(new THREE.Mesh(new THREE.SphereGeometry(14, 16, 16), new THREE.MeshBasicMaterial({ color: 0x00ff41, wireframe: true })));

        const planetMeshes = [], planetGroups = [], neutralReticles = [], atmospheres = [];

        function generateNoiseTexture(colorBase) {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d'); const imgData = ctx.createImageData(256, 256);
            for (let i = 0; i < imgData.data.length; i += 4) {
                const noise = Math.random() * 85; const c = new THREE.Color(colorBase);
                imgData.data[i] = Math.max(0, (c.r * 255) - noise); imgData.data[i+1] = Math.max(0, (c.g * 255) - noise); imgData.data[i+2] = Math.max(0, (c.b * 255) - noise); imgData.data[i+3] = 255;
            }
            ctx.putImageData(imgData, 0, 0); return new THREE.CanvasTexture(canvas);
        }

        function createLabelSprite(text, colorHex) {
            const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 40;
            const ctx = canvas.getContext('2d'); ctx.font = 'Bold 20px "Special Elite", monospace';
            ctx.fillStyle = "#" + new THREE.Color(colorHex).getHexString(); ctx.textAlign = 'center';
            ctx.fillText(text === "NONE" ? "???" : text, 64, 26);
            const texture = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true }));
            sprite.name = "holoLabel"; sprite.scale.set(16, 5, 1); return sprite;
        }

        PLANET_DATA.forEach((data) => {
            const group = new THREE.Group(); scene.add(group); planetGroups.push(group);
            group.userData.orbitalSpeed = (0.01 / Math.sqrt(data.dist)) * 0.4;
            const ring = new THREE.Mesh(new THREE.RingGeometry(data.dist - 0.5, data.dist + 0.5, 64), new THREE.MeshBasicMaterial({ color: 0x00ff55, transparent: true, opacity: 0.08, side: THREE.DoubleSide }));
            ring.rotation.x = Math.PI / 2; scene.add(ring);

            const tex = generateNoiseTexture(data.color);
            const pMesh = new THREE.Mesh(new THREE.SphereGeometry(data.size, 32, 32), new THREE.MeshStandardMaterial({ map: tex, bumpMap: tex, color: data.color, emissive: data.color, emissiveIntensity: (data.player === "None" ? 0.6 : 0.4), roughness: 0.6, metalness: 0.1 }));
            pMesh.userData = data;

            const cloud = new THREE.Mesh(new THREE.SphereGeometry(data.size * 1.08, 16, 16), new THREE.MeshPhongMaterial({ color: data.color, transparent: true, opacity: 0.15, wireframe: true }));
            pMesh.add(cloud); atmospheres.push(cloud);

            const labelSprite = createLabelSprite(data.player.toUpperCase(), data.color);
            labelSprite.position.y = data.size + 3.5; pMesh.add(labelSprite);

            if (data.player === "None") {
                const ret = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.OctahedronGeometry(data.size * 1.5, 0)), new THREE.LineBasicMaterial({ color: 0xFF0000, transparent: true, opacity: 0.4 }));
                pMesh.add(ret); neutralReticles.push(ret);
            }
            pMesh.position.x = data.dist; group.add(pMesh); planetMeshes.push(pMesh); group.rotation.y = Math.random() * Math.PI * 2;
        });

        const starGeo = new THREE.BufferGeometry(); const starCount = 350; const starPositions = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i+=3) { starPositions[i] = (Math.random() - 0.5) * 1600; starPositions[i+1] = (Math.random() - 0.5) * 1600; starPositions[i+2] = (Math.random() - 0.5) * 1600; }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, transparent: true, opacity: 0.25 })));

        function initFleets(logs) {
            fleetLayer.clear(); activeFleets = [];
            const neutralIndices = []; PLANET_DATA.forEach((p, idx) => { if(p.initialNeutral) neutralIndices.push(idx); });

            logs.forEach((log, lIdx) => {
                if (lIdx >= neutralIndices.length) return;
                const targetIndex = neutralIndices[lIdx]; const targetPlanet = PLANET_DATA[targetIndex];
                const friendly = PLANET_DATA.filter((p, i) => p.player === log.winner && !p.initialNeutral);
                if (!targetPlanet || !friendly.length) return;

                let baseWorld = friendly[0]; let targetMesh = planetMeshes[targetIndex]; let originMesh = planetMeshes[PLANET_DATA.indexOf(baseWorld)];
                const line = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineDashedMaterial({ color: FACTION_COLORS[log.winnerFaction], dashSize: 2, gapSize: 2 }));
                const ship = new THREE.Mesh(new THREE.ConeGeometry(1.5, 5, 4), new THREE.MeshBasicMaterial({ color: FACTION_COLORS[log.winnerFaction] }));
                fleetLayer.add(line); fleetLayer.add(ship); activeFleets.push({ line, ship, originMesh, targetMesh });
            });
        }

        function updateFleetTrajectories() {
            activeFleets.forEach(f => {
                const p1 = new THREE.Vector3(), p2 = new THREE.Vector3();
                f.originMesh.getWorldPosition(p1); f.targetMesh.getWorldPosition(p2);
                const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5); mid.y += 25;
                const curve = new THREE.QuadraticBezierCurve3(p1, mid, p2);
                f.line.geometry.setFromPoints(curve.getPoints(30)); f.line.computeLineDistances();
                f.ship.position.copy(curve.getPoint(0.5)); f.ship.lookAt(p2); f.ship.rotateX(Math.PI/2);
            });
        }

        renderer.domElement.addEventListener('pointerup', (u) => {
            const mouse = new THREE.Vector2((u.clientX / window.innerWidth) * 2 - 1, -(u.clientY / window.innerHeight) * 2 + 1);
            const raycaster = new THREE.Raycaster(); raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planetMeshes, false);
            if (intersects.length > 0) {
                const obj = intersects[0].object; const p = obj.userData; selectedPlanet = p.name;
                const worldPos = new THREE.Vector3(); obj.getWorldPosition(worldPos);
                targetLookAt.copy(worldPos); targetPos.set(worldPos.x + 22, worldPos.y + 14, worldPos.z + 22);
                isZoomed = true; isTransitioning = true; toggleMainUI(false); 
                document.getElementById('info-box').style.display = 'block'; document.getElementById('reset-view').style.display = 'block';
                document.getElementById('planet-name').innerText = p.name.toUpperCase(); document.getElementById('planet-rule').innerText = p.rule;
                document.getElementById('faction-label').innerText = `COMMANDER: ${p.player.toUpperCase()} // FACTION: ${(p.army || 'UNOCCUPIED').toUpperCase()}`;
            }
        });

        function resetSectorView() { 
            isZoomed = false; isTransitioning = true; 
            targetPos.set(0, 400, 700); targetLookAt.set(0, 0, 0); 
            document.getElementById('info-box').style.display = 'none'; document.getElementById('reset-view').style.display = 'none'; 
            toggleMainUI(true); 
        }

        function animate() {
            document.getElementById('instructions').style.color = '#004411'; // Keep accessing vault visible
            requestAnimationFrame(animate);
            planetGroups.forEach((g) => { g.rotation.y += g.userData.orbitalSpeed; }); 
            atmospheres.forEach(a => { a.rotation.y -= 0.002; }); 
            neutralReticles.forEach(r => { r.rotation.y += 0.008; r.material.opacity = 0.3 + Math.random() * 0.3; });
            planetMeshes.forEach(mesh => { const sprite = mesh.getObjectByName("holoLabel"); if(sprite) sprite.quaternion.copy(camera.quaternion); });
            
            if (isTransitioning) { 
                camera.position.lerp(targetPos, 0.06); 
                controls.target.lerp(targetLookAt, 0.06); 
                if (camera.position.distanceTo(targetPos) < 2.0) { 
                    isTransitioning = false; 
                } 
            }
            updateFleetTrajectories(); controls.update(); renderer.render(scene, camera);
        }

        updateFactionDropdown(1); updateFactionDropdown(2);
        updateLeaderboard(); rebuildArchiveTable();
        syncWarLog(); animate();
        setInterval(syncWarLog, 30000);
    </script>
</body>
</html>
